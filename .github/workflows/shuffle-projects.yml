#
# shuffle-projects.yml - GitHub Actions workflow that randomly reorders
# the project list in README.md to give equal visibility to all projects.
#
# Triggers
# --------
# schedule      Runs every Monday at 12:00 UTC - deliberately offset from
#               the daily star-count workflow (00:00 UTC) so the two jobs
#               never run simultaneously and their pushes cannot conflict.
# workflow_dispatch
#               Can be triggered manually from the Actions tab at any time.
#
# Permissions
# -----------
# contents: Write is required so the job can commit and push the reordered
# README.md back to the repository.
#
# No-op behaviour
# ---------------
# The final step checks `git diff` before committing. If the shuffle
# produced the same order as before, README.md is not touched and the
# commit is skipped, preventing empty chore commits.

name: Shuffle Project Order

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  shuffle-projects:
    runs-on: ubuntu-latest

    steps:
      # Full clone is not needed; depth=1 keeps checkout fast.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # The script uses only the standard library; setup-python pins the
      # interpreter version for reproducibility across runner images.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Shuffle project list in README
        run: python scripts/shuffle_projects.py

      # Configure git identity required for commits made by automation.
      # The commit is skipped entirely when README.md has no diff.
      - name: Commit and push if README changed
        run: |
          git config user.name "Aayush Sinha"
          git config user.email "hello@yush.dev"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: Shuffle project order" &&
            git push
          )
